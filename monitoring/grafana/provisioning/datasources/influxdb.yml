# Автоподключение InfluxDB. Секреты подставляются из переменных окружения
# (Grafana раскрывает $VAR в provisioning-файлах), которые приходят из .env.
apiVersion: 1

datasources:
  - name: InfluxDB
    uid: DS_INFLUXDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: $INFLUXDB_ORG
      defaultBucket: $INFLUXDB_BUCKET
    secureJsonData:
      token: $INFLUXDB_TOKEN